pre-commit:
  parallel: false
  commands:
    format:
      glob: '*.{ts,tsx,cts,mts,js,jsx,cjs,mjs,json,jsonc,css,md}'
      stage_fixed: true
      run: npm exec -- biome format --write --no-errors-on-unmatched {staged_files}
    lint:
      glob: '*.{ts,tsx,cts,mts,js,jsx,cjs,mjs,json,jsonc,css,md}'
      stage_fixed: true
      run: npm exec -- biome lint --no-errors-on-unmatched {staged_files}
    typecheck:
      run: npm run typecheck:all
